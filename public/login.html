<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Social Music</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="container">
        <div class="curved-shape"></div>
        <div class="form-box Login"> 
            <h2>Iniciar sesión</h2>
            <form action="#" id="formLogin">
                
                <div class="input-box"> 
                    <input type="email" required id="emailLogin">
                    <label for="">Email</label>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-fill" viewBox="0 0 16 16">
                        <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
                    </svg>
                </div>
                
                <div class="input-box">
                    <input type="password" required id="passLogin"> <label for="">Contraseña</label>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lock-fill" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M8 0a4 4 0 0 1 4 4v2.05a2.5 2.5 0 0 1 2 2.45v5a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 2 13.5v-5a2.5 2.5 0 0 1 2-2.45V4a4 4 0 0 1 4-4m0 1a3 3 0 0 0-3 3v2h6V4a3 3 0 0 0-3-3"/>
                    </svg>
                </div>
                
                <div class="input-box">
                    <button class="btn" type="submit">Iniciar sesión</button>
                </div>
                
                <div class="regi-link">
                    <p>¿No tienes cuenta?<a href="registrarse.html" class="SignUplink">Inscribirse</a></p>

                </div>
            </form>

        </div>
        <div class="info-content Login">
            <h2 style="text-align: center;">¡Bienvenido a social Music!</h2>
            <p style="text-align: center;">La red social para músicos. Conecta, colabora y crea música juntos.</p>

            <div class="logo-guitarra">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="bi bi-music-note-beamed" viewBox="0 0 16 16">
            <path d="M6 13c0 1.105-1.12 2-2.5 2S1 14.105 1 13s1.12-2 2.5-2 2.5.895 2.5 2m9-2c0 1.105-1.12 2-2.5 2S10 12.105 10 11s1.12-2 2.5-2 2.5.895 2.5 2"/>
            <path fill-rule="evenodd" d="M14 11V2h1v9zM6 3v10H5V3z"/>
            <path d="M5 2.905a1 1 0 0 1 .9-.995l8-.8a1 1 0 0 1 1.1.995V3L5 4z"/>
        </svg>
        </div>
        
        
        

    </div>

    
    <script src="Registro.js"></script> 
    
</body>
</html>
